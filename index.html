<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoGen Retreat</title>
    <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dsqmjneyd/image/upload/q_auto/f_auto/v1780814150/logo_kfset6.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Libre+Baskerville:wght@400;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { 
              sand: '#F3EFE6', 
              ivory: '#FAF8F2', 
              forest: '#2F5D50', 
              forestDeep: '#204138', 
              gold: '#C8B27D', 
              charcoal: '#222222', 
              sage: '#607A5F', 
              midnightForest: '#0f1f1b' 
            },
            fontFamily: { 
              sans: ['Inter', 'sans-serif'], 
              serif: ['"Cormorant Garamond"', '"Playfair Display"', 'serif'], 
              subtitle: ['"Libre Baskerville"', 'serif'] 
            }
          }
        }
      }
    </script>
    <style>
      /* Smooth scrolling and base overrides */
      html { scroll-behavior: smooth; }
      body { background-color: #FAF8F2; color: #222222; -webkit-font-smoothing: antialiased; }
      
      /* GHL Overrides & Typography */
      .ghl-ecogen-root { background: #FFFEFA !important; color: #222222 !important; -webkit-font-smoothing: antialiased; position: relative; width: 100%; overflow-x: hidden; }
      
      /* TYPOGRAPHY UPDATE: Professional Serif Look */
      .ghl-ecogen-root * { font-family: 'Libre Baskerville', serif; }
      
      /* Headings: Playfair Display, Bold, Upright (No Italic) */
      .ghl-ecogen-root .font-serif, .ghl-ecogen-root h1, .ghl-ecogen-root h2, .ghl-ecogen-root h3, #nav-logo { 
          font-family: 'Playfair Display', serif !important; 
          font-style: normal !important; 
          font-weight: 700 !important; 
      }

      /* Global Override: Remove Italics from everything except specific exceptions */
      .ghl-ecogen-root .italic {
          font-style: normal !important;
      }
      
      .ghl-ecogen-root .font-sans {
        font-family: 'Inter', sans-serif !important;
      }

      /* Animation Utilities */
      .fade-in-up {
        animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .ken-burns {
        animation: kb 30s infinite alternate ease-in-out;
      }
      @keyframes kb {
        from { transform: scale(1); }
        to { transform: scale(1.1); }
      }

      /* Calendar Styles */
      .calendar-day.booked { 
          background-color: #ef4444 !important; /* Red color */
          color: white !important; 
          cursor: not-allowed !important; 
          opacity: 0.7;
          text-decoration: line-through;
      }

      .calendar-day.booked.checkout-allowed {
          cursor: pointer !important;
          opacity: 1 !important;
          text-decoration: none !important;
          background: linear-gradient(135deg, #f3f0e7 50%, #ef4444 50%) !important;
          color: #222222 !important;
          border: 1px solid #ef4444;
      }
      
      .calendar-day.booked.selected {
          background: #2D4438 !important;
          color: white !important;
          text-decoration: none !important;
          opacity: 1 !important;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/": "https://esm.sh/react-dom@18.3.1/",
    "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.3.1",
    "react-router-dom": "https://esm.sh/react-router-dom@6.22.3?deps=react@18.3.1,react-dom@18.3.1"
  }
}
</script>
